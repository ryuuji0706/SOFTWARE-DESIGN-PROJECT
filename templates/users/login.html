{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CashFlow Login</title>

<style>
/* KEEP ALL YOUR EXISTING CSS EXACTLY AS IT IS */
*{ margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI", sans-serif; }
body{ height:100vh; display:flex; background:#071426; }
.left{ flex:1; background:#071426; display:flex; flex-direction:column; justify-content:center; padding:80px; color:white; }
.logo{ font-size:32px; font-weight:bold; display:flex; align-items:center; margin-bottom:10px; }
.logo span{ width:14px; height:14px; background:#00d4a6; transform:rotate(45deg); margin-right:10px; }
.subtitle{ color:#9fb0c3; margin-bottom:25px; }
.right{ flex:1; display:flex; justify-content:center; align-items:center; }
.login-box{ width:360px; background:#0f2438; padding:40px; border-radius:12px; }
h2{ color:white; }
p{ color:#9fb0c3; font-size:13px; margin-bottom:20px; }
label{ color:#cbd5e1; font-size:12px; }
input{ width:100%; padding:12px; margin:8px 0 15px; background:#10263d; border:1px solid #1f3b57; border-radius:6px; color:white; }
button{ width:100%; padding:12px; background:#00d4a6; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
button:hover{ background:#00b88f; }
.bottom{ text-align:center; margin-top:15px; font-size:12px; color:#9fb0c3; }
.bottom a{ color:#00d4a6; text-decoration:none; }
.error{ color:#ff4d4d; font-size:12px; margin-bottom:10px; }
@media(max-width:900px){ body{flex-direction:column;} .left{display:none;} .right{width:100%;} }

/* =========================================
   📱 MOBILE RESPONSIVE DESIGN (Login/Register)
   ========================================= */
@media(max-width: 900px) {
  body {
    flex-direction: column;
    display: flex;
  }
  
  /* Unhide the left side, but make it fit the mobile view */
  .left {
    display: flex;
    flex: none; /* Stops it from stretching */
    background: transparent; /* Blends it with the body */
    padding: 40px 20px 10px; /* Adds space at the top */
    justify-content: center;
    align-items: center;
  }
  
  /* Hide the extra text, keep only the Logo */
  .left .subtitle, .left .steps {
    display: none;
  }
  
  /* Center the form box */
  .right {
    width: 100%;
    height: auto; 
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-bottom: 40px;
  }
  
  .login-box, .form-box {
    width: 90%; 
    max-width: 400px;
  }
}
</style>
</head>

<body>

<div class="left">
  <div class="logo"><span></span>CashFlow</div>
  <div class="subtitle">Smart Personal Finance Tracker</div>
</div>

<div class="right">

  <div class="login-box">

    <h2>Welcome Back</h2>
    <p>Sign in to continue</p>

    {% if messages %}
      {% for message in messages %}
        <p class="error">{{ message }}</p>
      {% endfor %}
    {% endif %}

    <form action="{% url 'login' %}" method="POST">
      {% csrf_token %}
      
      <label>Username</label>
      <input type="text" name="username" required>

      <label>Password</label>
      <input type="password" name="password" required>

      <button type="submit">Login</button>
    </form>

    <div class="bottom">
      Don't have an account? <a href="{% url 'register' %}">Create Account</a>
    </div>

  </div>

</div>

</body>
</html>
