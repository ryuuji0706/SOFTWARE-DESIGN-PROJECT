{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashFlow - Edit Bill</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
body{ width:100%; height:100vh; background:#071b2f; display:flex; overflow:hidden; justify-content: center; align-items: center; }

.panel{ background:#102743; border-radius:14px; padding:30px; width: 400px; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.panel-header{ margin-bottom:20px; text-align: center; }
.panel-header h3 { font-size: 24px; color: #00d2a0; }
.panel-header p { color: #8aa3bd; font-size: 13px; }

input, select { 
    width:100%; 
    padding:12px; 
    margin-top:12px; 
    border:none; 
    border-radius:8px; 
    background:#071b2f; 
    color:white; 
    outline:none; 
}
select option { background: #071b2f; color: white; }

.btn-group { display: flex; gap: 10px; margin-top: 20px; }
button{ flex: 1; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:600; }
.saveBtn{ background:#2aa8ff; color:white; }
.cancelBtn{ background:#444; color:white; text-decoration: none; text-align: center; font-size: 14px; display: flex; align-items: center; justify-content: center;}

/* =========================================
   📱 MOBILE RESPONSIVE DESIGN (Under 768px)
   ========================================= */
@media (max-width: 768px) {
    /* 1. Reset Body Layout */
    body, .container {
        flex-direction: column;
        display: block;
    }

    /* 2. Transform Sidebar into Bottom App Navigation */
    .sidebar {
        width: 100%;
        height: auto;
        position: fixed;
        bottom: 0;
        left: 0;
        padding: 8px 5px;
        z-index: 1000;
        border-top: 1px solid #102743;
        background: #041527;
        display: block;
    }

    .sidebar > div:first-child {
        width: 100%;
    }

    /* Teleport the Logo to the center of the top header */
    .sidebar > div:first-child .logo {
        display: flex;
        position: fixed;
        top: 20px; /* Aligns with the other topbar items */
        left: 50%;
        transform: translateX(-50%); /* Perfectly dead-centers it */
        z-index: 1060; /* Keeps it above the background */
    }

    .sidebar > div:first-child .logo h2 {
        font-size: 20px; /* Slightly smaller for the mobile top bar */
        margin: 0;
        line-height: 1;
    }

    .sidebar > div:first-child .logo span {
        display: none; /* Hides 'Smart Finance' so it doesn't look cluttered */
    }

    /* 3. Equally Spaced Menu */
    .menu {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: row;
        width: 100%;
        justify-content: space-between;
        gap: 2px;
    }

    .menu li {
        flex: 1;
        padding: 12px 2px;
        margin-bottom: 0;
        font-size: 10px;
        text-align: center;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* 4. SOLID TOP HEADER  */
    .sidebar-bottom {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 15px 20px;
        background: #081d33; 
        border-top: none;
        z-index: 1050;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
    }

    /* Fix the user info layout for the top right */
    .sidebar-user { 
        margin-bottom: 0; 
    }
    
    .user-circle { 
        width: 32px; 
        height: 32px; 
        flex-shrink: 0; /* Prevents the circle from squishing */
    }

    /* ADD THIS BLOCK: Forces long usernames to truncate safely */
    .sidebar-user span {
        max-width: 60px; /* Limits the name length */
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: block; /* Required for max-width to work on a span */
    }
    
    .logout-btn {
        padding: 6px 12px;
        font-size: 12px;
        width: auto;
        margin: 0;
    }

    /* 5. Adjust Main Content Area */
    .main-content, .main {
        width: 100%;
        height: 100vh;
        padding: 25px;
        padding-top: 90px; /* Pushes the title down safely below the new solid top header */
        padding-bottom: 85px; 
    }

    .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
        margin-bottom: 15px;
        padding-right: 0; 
    }

    /* 6. Force Grids to Stack Vertically */
    .cards, .content-grid, .grid, .insight-grid {
        grid-template-columns: 1fr;
        gap: 15px;
    }

    .panel-header {
        flex-direction: column;
        gap: 10px;
        align-items: flex-start;
    }
}
</style>
</head>
<body>

<div class="panel">
  <div class="panel-header">
    <h3>Edit Bill</h3>
    <p>Update your bill details</p>
  </div>
  
  <form method="POST">
    {% csrf_token %}
    <label style="font-size:12px; color:#8aa3bd;">Bill Name</label>
    <input name="name" value="{{ bill.name }}" required>
    
    <label style="font-size:12px; color:#8aa3bd; display:block; margin-top:10px;">Amount (₱)</label>
    <input name="amount" type="number" step="0.01" value="{{ bill.amount }}" required>
    
    <label style="font-size:12px; color:#8aa3bd; display:block; margin-top:10px;">Due Date</label>
    <input type="date" name="due" value="{{ bill.due_date|date:'Y-m-d' }}" required>
    
    <div class="btn-group">
      <a href="{% url 'bills' %}" class="cancelBtn">Cancel</a>
      <button type="submit" class="saveBtn">Save Changes</button>
    </div>
  </form>
</div>

</body>
</html>
