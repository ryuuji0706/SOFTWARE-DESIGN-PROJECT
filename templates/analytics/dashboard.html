{% extends 'analytics/base.html' %}
{% load static %}

{% block content %}
<div class="card">
    <h3>Spending Progress</h3>

    <!-- Circular Chart Container -->
    <div class="circular-chart-container" data-percentage="{{ percentage }}">
        <svg viewBox="0 0 36 36" class="circular-chart">
            <path class="circle-bg"
                d="M18 2.0845
                a 15.9155 15.9155 0 0 1 0 31.831
                a 15.9155 15.9155 0 0 1 0 -31.831"/>
            <path class="circle"
                d="M18 2.0845
                a 15.9155 15.9155 0 0 1 0 31.831
                a 15.9155 15.9155 0 0 1 0 -31.831"/>
            <text x="18" y="20.35" class="percentage">0%</text>
        </svg>
    </div>

    <!-- Interactive Spending Inputs -->
    <div class="spending-details">
        <p>
            Budget: ₱<input type="number" id="budgetInput" value="{{ budget }}">
        </p>
        <p>
            Spent: ₱<input type="number" id="spentInput" value="{{ spent }}">
        </p>
        <p>
            Remaining: ₱<span id="remainingDisplay">{{ remaining }}</span>
        </p>
    </div>
</div>
{% endblock %}
