<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Budget Manager</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Icons (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<!-- HEADER / NAV -->
<nav>
    <h2><i class="fas fa-wallet"></i> Smart Budget</h2>

    <div class="nav-links">
        <a href="/dashboard"><i class="fas fa-home"></i> Dashboard</a>
        <a href="/bills"><i class="fas fa-file-invoice"></i> Bills</a>
        <a href="/expenses"><i class="fas fa-money-bill-wave"></i> Expenses</a>
        <a href="/summary"><i class="fas fa-chart-line"></i> Summary</a>
        <a href="/suggestions"><i class="fas fa-lightbulb"></i> Tips</a>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container">
    {% block content %}{% endblock %}
</div>

<!-- FLOATING ACTION BUTTON -->
<div class="fab">
    <i class="fas fa-plus"></i>
</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Smart Budget Manager</p>
</footer>

<!-- JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
