<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CashFlow - Reminders</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  width:100%;
  height:100vh;
  background:#071b2f;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR (same as dashboard) */
.sidebar{
  width:240px;
  background:#041527;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px 15px;
}

.logo h2{
  font-size:24px;
  color:#00d2a0;
}

.logo span{
  font-size:12px;
  color:#8aa3bd;
}

.menu{
  list-style:none;
  margin-top:20px;
}

.menu li{
  padding:14px 16px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
  color:#9db2c8;
  font-size:14px;
}

.menu li:hover,
.menu .active{
  background:#0b2844;
  color:white;
}

/* MAIN */
.main-content{
  flex:1;
  padding:25px;
  background:#081d33;
  color:white;
  overflow-y:auto;
}

/* TOPBAR (dashboard style) */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.topbar h1{
  font-size:28px;
}

.topbar p{
  color:#8aa3bd;
  font-size:13px;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.user-circle{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#00d2a0;
}

/* CARDS (dashboard style) */
.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  margin-bottom:20px;
}

.card{
  background:#102743;
  padding:20px;
  border-radius:14px;
  border-left:3px solid #00d2a0;
}

/* GRID like dashboard */
.content-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.panel{
  background:#102743;
  border-radius:14px;
  padding:20px;
}

.panel-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  color:#8aa3bd;
}

.bill{
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.bill-top{
  display:flex;
  justify-content:space-between;
  color:white;
}

small{
  color:#8aa3bd;
}

.overdue{
  color:#ff5c5c;
  font-weight:600;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div>
    <div class="logo">
      <h2>CashFlow</h2>
      <span>Smart Finance</span>
    </div>

    <ul class="menu">
      <li onclick="location.href='dashboard.html'">Dashboard</li>
      <li onclick="location.href='bills.html'">Bills</li>
      <li onclick="location.href='transactions.html'">Transactions</li>
      <li onclick="location.href='analytics.html'">Analytics</li>
      <li onclick="location.href='budget.html'">Budget</li>
      <li class="active">Reminders</li>
    </ul>
  </div>

</div>

<!-- MAIN -->
<div class="main-content">

  <!-- TOPBAR -->
  <div class="topbar">

    <div>
      <h1>Reminders</h1>
      <p>Overdue + Manual + Real-time Sync</p>
    </div>

    <div class="user">
      <div class="user-circle"></div>
      <span id="username"></span>
    </div>

  </div>

  <!-- CARDS -->
  <div class="cards">

    <div class="card">
      <h3>Pending</h3>
      <h2 id="pending">0</h2>
    </div>

    <div class="card">
      <h3>Overdue</h3>
      <h2 id="overdue">0</h2>
    </div>

    <div class="card">
      <h3>Completed</h3>
      <h2 id="done">0</h2>
    </div>

  </div>

  <!-- GRID -->
  <div class="content-grid">

    <!-- LEFT: REMINDERS -->
    <div class="panel">

      <div class="panel-header">
        <h3>Recent Reminders</h3>
        <span>Live</span>
      </div>

      <div id="reminderList"></div>

    </div>

    <!-- RIGHT: OVERDUE ONLY -->
    <div class="panel">

      <div class="panel-header">
        <h3>Overdue Bills</h3>
      </div>

      <div id="overdueList"></div>

    </div>

  </div>

</div>

<script>

/* =========================
   USER SYSTEM (same as dashboard)
========================= */
function getUser(){
  const u1 = localStorage.getItem("user");
  const u2 = JSON.parse(localStorage.getItem("registeredUser"));
  return u1 || (u2 ? u2.name : "User");
}

document.getElementById("username").innerText = getUser();

/* =========================
   REAL-TIME SYNC
========================= */
const channel = new BroadcastChannel("cashflow_realtime");

window.addEventListener("storage", () => render());

channel.onmessage = (e) => {
  if(e.data === "refresh_dashboard"){
    render();
  }
};

/* =========================
   DATA
========================= */
function getBills(){
  return JSON.parse(localStorage.getItem("bills")) || [];
}

function getReminders(){
  return JSON.parse(localStorage.getItem("reminders")) || [];
}

/* =========================
   MERGE DATA
========================= */
function getAll(){

  const bills = getBills();
  const reminders = getReminders();

  const overdue = bills.filter(b => b.status === "Overdue");

  return {
    overdue,
    reminders
  };

}

/* =========================
   RENDER
========================= */
function render(){

  const { overdue, reminders } = getAll();

  const reminderBox = document.getElementById("reminderList");
  const overdueBox = document.getElementById("overdueList");

  reminderBox.innerHTML = "";
  overdueBox.innerHTML = "";

  let pending = 0;
  let done = 0;

  reminders.forEach(r => {

    if(r.status === "completed") done++;
    else pending++;

    reminderBox.innerHTML += `
      <div class="bill">
        <div class="bill-top">
          <strong>${r.name}</strong>
          <span>₱${r.amount}</span>
        </div>
        <small>${r.status}</small>
      </div>
    `;

  });

  overdue.forEach(b => {

    overdueBox.innerHTML += `
      <div class="bill">
        <div class="bill-top">
          <strong>${b.name}</strong>
          <span>₱${b.amount}</span>
        </div>
        <small class="overdue">OVERDUE</small>
      </div>
    `;

  });

  document.getElementById("pending").innerText = pending;
  document.getElementById("done").innerText = done;
  document.getElementById("overdue").innerText = overdue.length;

}

/* INIT */
render();

</script>

</body>
</html>
