<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CashFlow - Transactions</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  width:100%;
  height:100vh;
  background:#071b2f;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#041527;
  color:white;
  padding:20px 15px;
}

.logo h2{color:#00d2a0;}
.logo span{font-size:12px;color:#8aa3bd;}

.menu{list-style:none;margin-top:20px;}

.menu li{
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
  color:#9db2c8;
}

.menu li:hover,
.menu .active{
  background:#0b2844;
  color:white;
}

/* MAIN */
.main-content{
  flex:1;
  padding:25px;
  background:#081d33;
  color:white;
  overflow-y:auto;
}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  margin-bottom:20px;
}

.card{
  background:#102743;
  padding:20px;
  border-radius:14px;
}

/* INPUT */
.panel{
  background:#102743;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  background:#071b2f;
  color:white;
}

button{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00d2a0;
  font-weight:600;
  cursor:pointer;
}

/* TRANSACTION LIST */
.transaction{
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.top{
  display:flex;
  justify-content:space-between;
}

.income{color:#00d2a0;font-weight:600;}
.expense{color:#ff5c5c;font-weight:600;}

.small{font-size:12px;color:#8aa3bd;}
</style>
</head>

<body>

<div class="sidebar">
  <div>
    <div class="logo">
      <h2>CashFlow</h2>
      <span>Smart Finance</span>
    </div>

    <ul class="menu">
      <li onclick="location.href='dashboard.html'">Dashboard</li>
      <li onclick="location.href='bills.html'">Bills</li>
      <li class="active">Transactions</li>
      <li onclick="location.href='analytics.html'">Analytics</li>
      <li onclick="location.href='budget.html'">Budget</li>
      <li onclick="location.href='reminders.html'">Reminders</li>
    </ul>
  </div>
</div>

<div class="main-content">

<div class="topbar">
  <h2>Transactions</h2>
  <span id="username"></span>
</div>

<!-- CARDS -->
<div class="cards">
  <div class="card">
    <h4>Income</h4>
    <h2 id="income">₱0</h2>
  </div>

  <div class="card">
    <h4>Expense</h4>
    <h2 id="expense">₱0</h2>
  </div>

  <div class="card">
    <h4>Net</h4>
    <h2 id="net">₱0</h2>
  </div>
</div>

<!-- ADD -->
<div class="panel">
  <h3>Add Transaction</h3>

  <input id="desc" placeholder="Description">
  <input id="amount" type="number" placeholder="Amount">

  <select id="type">
    <option>Income</option>
    <option>Expense</option>
  </select>

  <button onclick="add()">Add Transaction</button>
</div>

<!-- LIST -->
<div class="panel">
  <h3>History</h3>
  <div id="list"></div>
</div>

</div>

<script>

/* ================= REAL-TIME ================= */
const channel = new BroadcastChannel("cashflow_realtime");

channel.onmessage = (e) => {
  if(e.data === "update") render();
};

window.addEventListener("storage", (e)=>{
  if(["transactions","bills"].includes(e.key)){
    render();
  }
});

/* ================= USER ================= */
document.getElementById("username").innerText =
  localStorage.getItem("user") || "User";

/* ================= STORAGE ================= */
function getTransactions(){
  return JSON.parse(localStorage.getItem("transactions")) || [];
}

function getBills(){
  return JSON.parse(localStorage.getItem("bills")) || [];
}

/* ================= CLEAN SYNC ================= */
function syncBills(){

  let bills = getBills();
  let data = getTransactions();

  bills.forEach(b => {

    // ❌ skip invalid
    if(!b.name || !b.amount || isNaN(Number(b.amount))) return;

    if(b.status === "Paid"){

      const exists = data.some(t =>
        t.desc === b.name &&
        Number(t.amount) === Number(b.amount)
      );

      if(!exists){
        data.push({
          desc: b.name,
          amount: Number(b.amount),
          type: "Expense"
        });
      }
    }
  });

  localStorage.setItem("transactions", JSON.stringify(data));
}

/* ================= ADD ================= */
function add(){

  const desc = document.getElementById("desc").value.trim();
  const amount = Number(document.getElementById("amount").value);
  const type = document.getElementById("type").value;

  // ❌ BLOCK INVALID INPUT
  if(!desc || !amount || amount <= 0){
    alert("Invalid input");
    return;
  }

  let data = getTransactions();

  data.push({ desc, amount, type });

  localStorage.setItem("transactions", JSON.stringify(data));

  channel.postMessage("update");
  render();
}

/* ================= RENDER (FIXED ₱0 BUG + LAST 10 ONLY) ================= */
function render(){

  syncBills();

  let data = getTransactions().filter(t =>
    t &&
    t.desc &&
    t.amount &&
    !isNaN(Number(t.amount)) &&
    Number(t.amount) > 0
  );

  let income = data
    .filter(t => t.type === "Income")
    .reduce((a,b)=>a + Number(b.amount), 0);

  let expense = data
    .filter(t => t.type === "Expense")
    .reduce((a,b)=>a + Number(b.amount), 0);

  document.getElementById("income").innerText = "₱" + income;
  document.getElementById("expense").innerText = "₱" + expense;
  document.getElementById("net").innerText = "₱" + (income - expense);

  // 🔥 LAST 10 ONLY
  const latest = data.slice(-10).reverse();

  const list = document.getElementById("list");
  list.innerHTML = "";

  if(latest.length === 0){
    list.innerHTML = "<small>No transactions yet.</small>";
    return;
  }

  latest.forEach(t => {

    list.innerHTML += `
      <div class="transaction">
        <div class="top">
          <div>
            <b>${t.desc}</b><br>
            <span class="small">${t.type}</span>
          </div>

          <div class="${t.type === "Income" ? "income" : "expense"}">
            ₱${Number(t.amount)}
          </div>
        </div>
      </div>
    `;

  });

}

/* INIT */
render();

</script>

</body>
</html>
