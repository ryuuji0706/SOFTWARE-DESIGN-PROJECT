<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CashFlow Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

body{
  height:100vh;
  display:flex;
  background:#071426;
}

.left{
  flex:1;
  background:#071426;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:80px;
  color:white;
}

.logo{
  font-size:32px;
  font-weight:bold;
  display:flex;
  align-items:center;
  margin-bottom:10px;
}

.logo span{
  width:14px;
  height:14px;
  background:#00d4a6;
  transform:rotate(45deg);
  margin-right:10px;
}

.subtitle{
  color:#9fb0c3;
  margin-bottom:25px;
}

.right{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  width:360px;
  background:#0f2438;
  padding:40px;
  border-radius:12px;
}

h2{
  color:white;
}

p{
  color:#9fb0c3;
  font-size:13px;
  margin-bottom:20px;
}

label{
  color:#cbd5e1;
  font-size:12px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0 15px;
  background:#10263d;
  border:1px solid #1f3b57;
  border-radius:6px;
  color:white;
}

button{
  width:100%;
  padding:12px;
  background:#00d4a6;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#00b88f;
}

.bottom{
  text-align:center;
  margin-top:15px;
  font-size:12px;
  color:#9fb0c3;
}

.bottom a{
  color:#00d4a6;
  text-decoration:none;
}

.error{
  color:#ff4d4d;
  font-size:12px;
  margin-bottom:10px;
}

@media(max-width:900px){
  body{flex-direction:column;}
  .left{display:none;}
  .right{width:100%;}
}
</style>
</head>

<body>

<div class="left">
  <div class="logo"><span></span>CashFlow</div>
  <div class="subtitle">Smart Personal Finance Tracker</div>
</div>

<div class="right">

  <div class="login-box">

    <h2>Welcome Back</h2>
    <p>Sign in to continue</p>

    <p class="error" id="error"></p>

    <label>Email</label>
    <input type="email" id="email">

    <label>Password</label>
    <input type="password" id="password">

    <button onclick="login()">Login</button>

    <div class="bottom">
      Don't have an account? <a href="register.html">Create Account</a>
    </div>

  </div>

</div>

<script>
function login(){

  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const error = document.getElementById("error");

  error.innerText = "";

  if(!email || !pass){
    error.innerText = "Please fill in all fields!";
    return;
  }

  const storedUser = JSON.parse(localStorage.getItem("registeredUser"));

  if(!storedUser){
    error.innerText = "No account found. Please register first.";
    return;
  }

  if(email === storedUser.email && pass === storedUser.password){

    localStorage.setItem("user", storedUser.name);

    window.location.href = "dashboard.html";

  } else {
    error.innerText = "Invalid email or password!";
  }
}
</script>

</body>
</html>
