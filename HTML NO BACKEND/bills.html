<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashFlow - Bills</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  width:100%;
  height:100vh;
  background:#071b2f;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#041527;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px 15px;
}

.logo h2{ color:#00d2a0; font-size:24px; }
.logo span{ font-size:12px; color:#8aa3bd; }

.menu{ list-style:none; margin-top:20px; }

.menu li{
  padding:14px 16px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
  color:#9db2c8;
  font-size:14px;
}

.menu li:hover,
.menu .active{
  background:#0b2844;
  color:white;
}

/* MAIN */
.main-content{
  flex:1;
  padding:25px;
  background:#081d33;
  color:white;
  overflow-y:auto;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.topbar h1{ font-size:28px; }
.topbar p{ color:#8aa3bd; font-size:13px; }

.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.user-circle{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#00d2a0;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  margin-bottom:20px;
}

.card{
  background:#102743;
  padding:22px;
  border-radius:14px;
  border-left:3px solid #00d2a0;
}

/* PANEL */
.panel{
  background:#102743;
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
}

.panel-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  background:#071b2f;
  color:white;
  outline:none;
}

/* BUTTONS */
button{
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.addBtn{ background:#2aa8ff; color:white; }
.deleteBtn{ background:#444; color:white; }

.paidBtn{ background:#00d2a0; color:#06251d; }
.unpaidBtn{ background:#ffb020; color:white; }
.overdueBtn{ background:#ff5c5c; color:white; }

.button-group{
  display:flex;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

/* BILL ITEM */
.bill-item{
  background:#071b2f;
  padding:16px;
  border-radius:10px;
  margin-top:12px;
}

.bill-top{
  display:flex;
  justify-content:space-between;
}

.small{
  font-size:12px;
  color:#8aa3bd;
}

.Paid{ color:#00d2a0; font-weight:600; }
.Unpaid{ color:#ffb020; font-weight:600; }
.Overdue{ color:#ff5c5c; font-weight:600; }

</style>
</head>

<body>

<div class="sidebar">

  <div>
    <div class="logo">
      <h2>CashFlow</h2>
      <span>Smart Finance</span>
    </div>

    <ul class="menu">
      <li onclick="location.href='dashboard.html'">Dashboard</li>
      <li class="active">Bills</li>
      <li onclick="location.href='transactions.html'">Transactions</li>
      <li onclick="location.href='analytics.html'">Analytics</li>
      <li onclick="location.href='budget.html'">Budget</li>
      <li onclick="location.href='reminders.html'">Reminders</li>
    </ul>
  </div>

</div>

<div class="main-content">

  <div class="topbar">
    <div>
      <h1>Bills Management</h1>
      <p>Real-time synchronized system</p>
    </div>
    <div class="user">
      <div class="user-circle"></div>
      <span id="username"></span>
    </div>
  </div>

  <!-- STATS -->
  <div class="cards">
    <div class="card"><h3>Total</h3><h2 id="total">0</h2></div>
    <div class="card"><h3>Paid</h3><h2 id="paid">0</h2></div>
    <div class="card"><h3>Unpaid</h3><h2 id="unpaid">0</h2></div>
    <div class="card"><h3>Overdue</h3><h2 id="overdue">0</h2></div>
  </div>

  <!-- ADD BILL -->
  <div class="panel">

    <div class="panel-header">
      <h3>Add Bill</h3>
    </div>

    <input id="name" placeholder="Bill Name">
    <input id="amount" type="number" placeholder="Amount">
    <input id="due" type="date">

    <div class="button-group">
      <button class="addBtn" onclick="addBill()">Add Bill</button>
    </div>

  </div>

  <!-- LIST -->
  <div class="panel">

    <div class="panel-header">
      <h3>All Bills</h3>
      <span>Live Sync</span>
    </div>

    <input id="search" placeholder="Search..." onkeyup="render()">
    <div id="list"></div>

  </div>

</div>

<script>

/* =========================
   REAL-TIME SYNC
========================= */
const channel = new BroadcastChannel("cashflow_realtime");

window.addEventListener("storage", () => render());

channel.onmessage = (e) => {
  if(e.data === "refresh_dashboard"){
    render();
  }
};

/* =========================
   USER
========================= */
function getUser(){
  const u1 = localStorage.getItem("user");
  const u2 = JSON.parse(localStorage.getItem("registeredUser"));
  return u1 || (u2 ? u2.name : "User");
}

document.getElementById("username").innerText = getUser();

/* =========================
   DATA
========================= */
function getBills(){
  return JSON.parse(localStorage.getItem("bills")) || [];
}

function saveBills(data){
  localStorage.setItem("bills", JSON.stringify(data));
  channel.postMessage("refresh_dashboard");
}

/* =========================
   ADD BILL (DEFAULT UNPAID)
========================= */
function addBill(){

  const name = document.getElementById("name").value;
  const amount = document.getElementById("amount").value;
  const due = document.getElementById("due").value;

  if(!name || !amount || !due){
    alert("Fill all fields");
    return;
  }

  let bills = getBills();

  bills.push({
    id: Date.now(),
    name,
    amount: Number(amount),
    due,
    status: "Unpaid" // DEFAULT STATUS
  });

  saveBills(bills);

  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";
  document.getElementById("due").value = "";

  render();
}

/* =========================
   UPDATE / DELETE
========================= */
function updateStatus(id, status){

  let bills = getBills();

  bills = bills.map(b =>
    b.id === id ? { ...b, status } : b
  );

  saveBills(bills);
  render();
}

function deleteBill(id){

  let bills = getBills();

  bills = bills.filter(b => b.id !== id);

  saveBills(bills);
  render();
}

/* =========================
   RENDER
========================= */
function render(){

  let bills = getBills();

  const search =
    document.getElementById("search").value.toLowerCase();

  const filtered = bills.filter(b =>
    b.name.toLowerCase().includes(search)
  );

  document.getElementById("total").innerText = filtered.length;
  document.getElementById("paid").innerText =
    filtered.filter(b=>b.status==="Paid").length;
  document.getElementById("unpaid").innerText =
    filtered.filter(b=>b.status==="Unpaid").length;
  document.getElementById("overdue").innerText =
    filtered.filter(b=>b.status==="Overdue").length;

  const list = document.getElementById("list");
  list.innerHTML = "";

  filtered.forEach((b) => {

    list.innerHTML += `
      <div class="bill-item">

        <div class="bill-top">

          <div>
            <strong>${b.name}</strong><br>
            <span class="small">Due: ${b.due}</span>
          </div>

          <div>
            <strong>₱${b.amount}</strong><br>
            <span class="${b.status}">${b.status}</span>
          </div>

        </div>

        <div class="button-group">

          <button class="paidBtn"
            onclick="updateStatus(${b.id},'Paid')">Paid</button>

          <button class="unpaidBtn"
            onclick="updateStatus(${b.id},'Unpaid')">Unpaid</button>

          <button class="overdueBtn"
            onclick="updateStatus(${b.id},'Overdue')">Overdue</button>

          <button class="deleteBtn"
            onclick="deleteBill(${b.id})">Delete</button>

        </div>

      </div>
    `;
  });
}

/* INIT */
render();

</script>

</body>
</html>
