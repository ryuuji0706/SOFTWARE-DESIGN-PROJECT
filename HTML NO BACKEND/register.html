<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CashFlow Register</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

body{
  height:100vh;
  display:flex;
  background:#0b1c2e;
}

.left{
  flex:1;
  background:#081a2f;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:80px;
}

.logo{
  font-size:32px;
  font-weight:bold;
  display:flex;
  align-items:center;
  margin-bottom:10px;
}

.logo span{
  width:14px;
  height:14px;
  background:#00d4a6;
  transform:rotate(45deg);
  margin-right:10px;
}

.subtitle{
  color:#9fb0c3;
  margin-bottom:30px;
}

.steps{
  list-style:none;
}

.steps li{
  margin:15px 0;
  display:flex;
  align-items:center;
  color:#cbd5e1;
  font-size:14px;
}

.steps li span{
  background:#00d4a6;
  color:#06251d;
  font-weight:bold;
  font-size:12px;
  padding:4px 8px;
  border-radius:6px;
  margin-right:10px;
}

.right{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.form-box{
  width:360px;
}

h2{
  color:white;
  margin-bottom:5px;
}

p{
  color:#9fb0c3;
  font-size:13px;
  margin-bottom:20px;
}

label{
  color:#cbd5e1;
  font-size:12px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0 15px;
  background:#10263d;
  border:1px solid #1f3b57;
  border-radius:6px;
  color:white;
}

.row{
  display:flex;
  gap:10px;
}

button{
  width:100%;
  padding:12px;
  background:#00d4a6;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#00b88f;
}

.bottom{
  text-align:center;
  margin-top:15px;
  font-size:12px;
  color:#9fb0c3;
}

.bottom a{
  color:#00d4a6;
  text-decoration:none;
}

.error{
  color:#ff4d4d;
  font-size:12px;
  margin-bottom:10px;
}

@media(max-width:900px){
  body{flex-direction:column;}
  .left{display:none;}
  .right{width:100%;}
}
</style>
</head>

<body>

<div class="left">
  <div class="logo"><span></span>CashFlow</div>
  <div class="subtitle">Begin your financial journey.</div>

  <ul class="steps">
    <li><span>01</span> Create your account</li>
    <li><span>02</span> Set income & expenses</li>
    <li><span>03</span> Track finances</li>
  </ul>
</div>

<div class="right">
  <div class="form-box">

    <h2>Create Account</h2>
    <p>Join CashFlow — it's free!</p>

    <p class="error" id="errorMsg"></p>

    <label>Full Name</label>
    <input type="text" id="name">

    <label>Email</label>
    <input type="email" id="email">

    <div class="row">
      <div style="flex:1;">
        <label>Password</label>
        <input type="password" id="password">
      </div>

      <div style="flex:1;">
        <label>Confirm</label>
        <input type="password" id="confirm">
      </div>
    </div>

    <button onclick="register()">Create Account</button>

    <div class="bottom">
      Already have an account? <a href="login.html">Login</a>
    </div>

  </div>
</div>

<script>
function register(){

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;
  const error = document.getElementById("errorMsg");

  error.innerText = "";

  if(!name || !email || !pass || !confirm){
    error.innerText = "Please fill in all fields!";
    return;
  }

  if(pass !== confirm){
    error.innerText = "Passwords do not match!";
    return;
  }

  const user = {
    name: name,
    email: email,
    password: pass
  };

  localStorage.setItem("registeredUser", JSON.stringify(user));

  alert("Account created successfully!");

  window.location.href = "login.html";
}
</script>

</body>
</html>
