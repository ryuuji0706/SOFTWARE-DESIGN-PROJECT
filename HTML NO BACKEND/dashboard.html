<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CashFlow Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  width:100%;
  height:100vh;
  background:#071b2f;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#041527;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px 15px;
}

.logo h2{
  font-size:24px;
  color:#00d2a0;
}

.logo span{
  font-size:12px;
  color:#8aa3bd;
}

.menu{
  list-style:none;
  margin-top:20px;
}

.menu li{
  padding:14px 16px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
  color:#9db2c8;
  font-size:14px;
}

.menu li:hover,
.menu .active{
  background:#0b2844;
  color:white;
}

/* MAIN */
.main-content{
  flex:1;
  padding:25px;
  background:#081d33;
  color:white;
  overflow-y:auto;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.topbar h1{
  font-size:28px;
}

.topbar p{
  color:#8aa3bd;
  font-size:13px;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.user-circle{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#00d2a0;
}

.logout-btn{
  background:#ff5c5c;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  margin-bottom:20px;
}

.card{
  background:#102743;
  padding:20px;
  border-radius:14px;
  border-left:3px solid #00d2a0;
}

.card h3{
  font-size:13px;
  color:#8aa3bd;
}

.card h2{
  font-size:26px;
}

/* GRID */
.content-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.panel{
  background:#102743;
  border-radius:14px;
  padding:20px;
}

.panel-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  color:#8aa3bd;
}

.bill{
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.bill-top{
  display:flex;
  justify-content:space-between;
  color:white;
}

small{
  color:#8aa3bd;
}

</style>
</head>

<body>

<div class="sidebar">

  <div>
    <div class="logo">
      <h2>CashFlow</h2>
      <span>Smart Finance</span>
    </div>

    <ul class="menu">
      <li class="active">Dashboard</li>
      <li onclick="location.href='bills.html'">Bills</li>
      <li onclick="location.href='transactions.html'">Transactions</li>
      <li onclick="location.href='analytics.html'">Analytics</li>
      <li onclick="location.href='budget.html'">Budget</li>
      <li onclick="location.href='reminders.html'">Reminders</li>
    </ul>
  </div>

</div>

<div class="main-content">

  <div class="topbar">

    <div>
      <h1>Dashboard</h1>
      <p>Real-time financial overview</p>
    </div>

    <div class="user">
      <div class="user-circle"></div>
      <span id="username"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

  </div>

  <!-- CARDS -->
  <div class="cards">

    <div class="card">
      <h3>Total Bills</h3>
      <h2 id="totalBills">0</h2>
    </div>

    <div class="card">
      <h3>Paid Bills</h3>
      <h2 id="paidBills">0</h2>
    </div>

    <div class="card">
      <h3>Unpaid Bills</h3>
      <h2 id="unpaidBills">0</h2>
    </div>

    <div class="card">
      <h3>Reminders</h3>
      <h2 id="reminderCount">0</h2>
    </div>

  </div>

  <!-- GRID -->
  <div class="content-grid">

    <div class="panel">

      <div class="panel-header">
        <h3>Recent Bills</h3>
        <span>Live</span>
      </div>

      <div id="recentBills"></div>

    </div>

    <div class="panel">

      <div class="panel-header">
        <h3>Upcoming Reminders</h3>
      </div>

      <div id="reminderList"></div>

    </div>

  </div>

</div>

<script>

/* =========================
   USER
========================= */
function getUser(){
  const u1 = localStorage.getItem("user");
  const u2 = JSON.parse(localStorage.getItem("registeredUser"));
  return u1 || (u2 ? u2.name : "User");
}

function loadUser(){
  document.getElementById("username").innerText = getUser();
}

/* =========================
   DATA
========================= */
function getBills(){
  return JSON.parse(localStorage.getItem("bills")) || [];
}

function getReminders(){
  return JSON.parse(localStorage.getItem("reminders")) || [];
}

/* =========================
   REAL-TIME CONNECTION
========================= */
const channel = new BroadcastChannel("cashflow_realtime");

/* Detect changes from other tabs/pages */
window.addEventListener("storage", (e) => {

  if (
    e.key === "bills" ||
    e.key === "reminders"
  ) {
    updateDashboard();
  }

});

/* Detect broadcast updates */
channel.onmessage = (e) => {

  if (e.data === "refresh_dashboard") {
    updateDashboard();
  }

};

/* =========================
   DASHBOARD UPDATE
========================= */
function updateDashboard(){

  const bills = getBills();
  const reminders = getReminders();

  /* BILL COUNTS */
  const total = bills.length;

  const paid = bills.filter(
    b => b.status === "Paid"
  ).length;

  const unpaid = bills.filter(
    b => b.status === "Unpaid"
  ).length;

  document.getElementById("totalBills").innerText = total;
  document.getElementById("paidBills").innerText = paid;
  document.getElementById("unpaidBills").innerText = unpaid;

  /* REMINDER COUNTS */
  const pendingReminders = reminders.filter(
    r => r.status === "pending"
  ).length;

  document.getElementById("reminderCount").innerText =
    pendingReminders;

  /* RECENT BILLS */
  const recent = bills.slice(-5).reverse();

  const recentBox =
    document.getElementById("recentBills");

  recentBox.innerHTML = "";

  if(recent.length === 0){

    recentBox.innerHTML =
      "<small>No bills yet.</small>";

  }

  recent.forEach(b => {

    recentBox.innerHTML += `
      <div class="bill">
        <div class="bill-top">
          <strong>${b.name}</strong>
          <span>₱${b.amount}</span>
        </div>

        <small>
          ${b.status} | Due: ${b.due}
        </small>
      </div>
    `;

  });

  /* RECENT REMINDERS */
  const reminderBox =
    document.getElementById("reminderList");

  reminderBox.innerHTML = "";

  const recentReminders =
    reminders.slice(-5).reverse();

  if(recentReminders.length === 0){

    reminderBox.innerHTML =
      "<small>No reminders yet.</small>";

  }

  recentReminders.forEach(r => {

    reminderBox.innerHTML += `
      <div class="bill">
        <div class="bill-top">
          <strong>${r.name}</strong>
          <span>₱${r.amount}</span>
        </div>

        <small>
          ${r.status}
        </small>
      </div>
    `;

  });

}

/* =========================
   LOGOUT
========================= */
function logout(){

  localStorage.removeItem("user");
  window.location.href = "login.html";

}

/* =========================
   INIT
========================= */
loadUser();
updateDashboard();

</script>

</body>
</html>
