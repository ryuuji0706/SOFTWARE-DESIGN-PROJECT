<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CashFlow - Budget</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#071b2f;
  height:100vh;
  overflow:hidden;
}

.container{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#041527;
  color:white;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.logo h2{color:#00d2a0;}
.logo span{font-size:12px;color:#8aa3bd;}

.menu{
  list-style:none;
  margin-top:20px;
}

.menu li{
  padding:12px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
  color:#9db2c8;
}

.menu li:hover,
.menu .active{
  background:#0b2844;
  color:white;
}

/* MAIN */
.main{
  flex:1;
  padding:25px;
  overflow-y:auto;
  color:white;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

select{
  padding:10px;
  border-radius:8px;
  border:none;
  background:#102743;
  color:white;
}

/* BUTTON */
button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#00d2a0;
  color:#06251d;
  cursor:pointer;
  font-weight:600;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  margin-bottom:20px;
}

.card{
  background:#102743;
  padding:18px;
  border-radius:12px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.cat{
  background:#102743;
  padding:18px;
  border-radius:12px;
}

.progress{
  height:10px;
  background:#071b2f;
  border-radius:20px;
  overflow:hidden;
  margin-top:10px;
}

.bar{height:100%;border-radius:20px;}
.good{background:#00d2a0;}
.warn{background:#ffb020;}
.bad{background:#ff4040;}

.suggest{
  margin-top:10px;
  font-size:12px;
  color:#8aa3bd;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  width:350px;
  background:#102743;
  padding:20px;
  border-radius:12px;
}

.modal-content input,
.modal-content select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#071b2f;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <div>
    <div class="logo">
      <h2>CashFlow</h2>
      <span>Smart Finance</span>
    </div>

    <ul class="menu">
      <li onclick="location.href='dashboard.html'">Dashboard</li>
      <li onclick="location.href='bills.html'">Bills</li>
      <li onclick="location.href='transactions.html'">Transactions</li>
      <li onclick="location.href='analytics.html'">Analytics</li>
      <li class="active">Budget</li>
      <li onclick="location.href='reminders.html'">Reminders</li>
    </ul>
  </div>

  <div style="color:#8aa3bd;font-size:12px">
    <div id="user"></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <h2>Budget Tracker</h2>

  <div style="display:flex;gap:10px;">
    <select id="month" onchange="render()">
      <option value="all">All Months</option>
      <option value="0">Jan</option>
      <option value="1">Feb</option>
      <option value="2">Mar</option>
      <option value="3">Apr</option>
      <option value="4">May</option>
    </select>

    <button onclick="openModal()">+ Set Budget</button>
  </div>
</div>

<div class="cards">
  <div class="card"><h3>Good</h3><h2 id="good">0</h2></div>
  <div class="card"><h3>Warning</h3><h2 id="warn">0</h2></div>
  <div class="card"><h3>Over</h3><h2 id="bad">0</h2></div>
</div>

<div class="grid" id="grid"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Set Budget</h3>

    <select id="cat">
      <option>Food</option>
      <option>Transport</option>
      <option>Utilities</option>
      <option>Shopping</option>
      <option>Health</option>
    </select>

    <input id="amount" type="number" placeholder="Budget amount">

    <button onclick="saveBudget()">Save</button>
  </div>
</div>

<script>

/* USER */
document.getElementById("user").innerText =
localStorage.getItem("user") || "User";

/* DATA */
function getTransactions(){
  return JSON.parse(localStorage.getItem("transactions")) || [];
}

function getBudgets(){
  return JSON.parse(localStorage.getItem("budgets")) || {};
}

function saveBudgets(data){
  localStorage.setItem("budgets", JSON.stringify(data));
}

/* MODAL */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

window.onclick = (e)=>{
  if(e.target.id==="modal"){
    document.getElementById("modal").style.display="none";
  }
}

/* SAVE BUDGET */
function saveBudget(){
  let b = getBudgets();
  b[cat.value] = Number(amount.value);
  saveBudgets(b);
  document.getElementById("modal").style.display="none";
  render();
}

/* CATEGORY */
function category(desc){
  desc=(desc||"").toLowerCase();
  if(desc.includes("food")) return "Food";
  if(desc.includes("transport")) return "Transport";
  if(desc.includes("utility")||desc.includes("electric")) return "Utilities";
  if(desc.includes("shop")) return "Shopping";
  if(desc.includes("health")) return "Health";
  return "Shopping";
}

/* MONTH FILTER */
function matchMonth(date){
  if(month.value==="all") return true;
  return new Date(date||Date.now()).getMonth()==month.value;
}

/* SUGGESTION */
function suggest(c,p){
  if(p<50) return "Good control";

  if(c==="Food") return "Cook at home";
  if(c==="Transport") return "Use public transport";
  if(c==="Utilities") return "Save electricity";
  if(c==="Shopping") return "Avoid impulse buying";
  if(c==="Health") return "Compare clinics";

  return "Monitor spending";
}

/* REALTIME */
setInterval(render,2000);

/* RENDER */
function render(){

  let t=getTransactions();
  let b=getBudgets();

  let cats=["Food","Transport","Utilities","Shopping","Health"];

  let g=0,w=0,ba=0;

  grid.innerHTML="";

  cats.forEach(c=>{

    let spent=t.filter(x=>
      x.type==="Expense" &&
      category(x.desc)===c &&
      matchMonth(x.date)
    ).reduce((a,x)=>a+(+x.amount||0),0);

    let limit=b[c]||1000;
    let p=(spent/limit)*100;

    let cls="good",label="Good";

    if(p>=100){cls="bad";label="Over";ba++;}
    else if(p>=70){cls="warn";label="Warning";w++;}
    else g++;

    grid.innerHTML+=`
    <div class="cat">
      <h3>${c}</h3>
      <small>₱${spent} / ₱${limit}</small>

      <div class="progress">
        <div class="bar ${cls}" style="width:${Math.min(p,100)}%"></div>
      </div>

      <div class="suggest">${suggest(c,p)}</div>
      <small>${label}</small>
    </div>`;
  });

  good.innerText=g;
  warn.innerText=w;
  bad.innerText=ba;
}

render();

</script>

</body>
</html>
